server:
  port: 8081

spring:
  application:
    name: User-Registration-service

  datasource:
    url: jdbc:postgresql://localhost:5432/User_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: never

  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: true

wallet:
  service:
    base-url: ${WALLET_SERVICE_BASE_URL:http://localhost:8082}

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: mySuperSecureSecretKeyForJwtAuthentication12345
  expiration: 3600000